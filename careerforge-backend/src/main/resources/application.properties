# ===================================================================
# APPLICATION INFO
# ===================================================================
spring.application.name=careerforge-backend
server.port=8080

# Active profile (dev | prod) — overridden by env variable in production
spring.profiles.active=dev

# ===================================================================
# DATABASE CONFIGURATION (MySQL)
# ===================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/careerforge_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=@Ishita_07
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# HIBERNATE / JPA CONFIGURATION
# ===================================================================
# DDL strategy: create | create-drop | update | validate | none
spring.jpa.hibernate.ddl-auto=update

# Show SQL in console (great for learning, disable in prod)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# MySQL 8 dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Avoid lazy-loading errors when serializing JSON
spring.jpa.open-in-view=false

# ===================================================================
# JWT CONFIGURATION
# ===================================================================
# Secret should be at least 256 bits (32+ chars). NEVER commit a real secret.
app.jwt.secret=ZmQ4ZTY4ZDBkY2VjZTM4Y2YwYjE3NDQ1ZmI3OGM3MmU4YjI5YmU5ZmU3ZjlmYzZjMjY2YjA0Mw==
# Token expiration in milliseconds (1 day = 86400000)
app.jwt.expiration-ms=86400000
# Header & prefix
app.jwt.header=Authorization
app.jwt.prefix=Bearer 

# ===================================================================
# CORS CONFIGURATION
# ===================================================================
app.cors.allowed-origins=http://localhost:5173

# ===================================================================
# JACKSON (JSON serialization)
# ===================================================================
spring.jackson.serialization.indent-output=true
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Kolkata

# ===================================================================
# LOGGING
# ===================================================================
logging.level.root=INFO
logging.level.org.springframework.security=DEBUG
logging.level.com.careerforge=DEBUG

# ===================================================================
# ERROR HANDLING
# ===================================================================
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never
server.error.include-exception=false

# ===================================================================
# AI SERVICE (placeholder — we'll fill this later)
# ===================================================================
app.ai.provider=openai
app.ai.api-key=YOUR_AI_API_KEY_HERE
app.ai.base-url=https://api.openai.com/v1