# ===================================================================
# APPLICATION INFO
# ===================================================================
spring.application.name=careerforge-backend
server.port=8080

# Active profile (dev | prod) — overridden by env variable in production
spring.profiles.active=dev

# ===================================================================
# DATABASE CONFIGURATION (MySQL)
# ===================================================================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# HIBERNATE / JPA CONFIGURATION
# ===================================================================
# DDL strategy: create | create-drop | update | validate | none
spring.jpa.hibernate.ddl-auto=update

# Show SQL in console (great for learning, disable in prod)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# MySQL 8 dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Avoid lazy-loading errors when serializing JSON
spring.jpa.open-in-view=false

# ===================================================================
# JWT CONFIGURATION
# ===================================================================
# Secret should be at least 256 bits (32+ chars). NEVER commit a real secret.
app.jwt.secret=${APP_JWT_SECRET}
# Token expiration in milliseconds (1 day = 86400000)
app.jwt.expiration-ms=86400000
# Header & prefix
app.jwt.header=Authorization
app.jwt.prefix=Bearer 

# ===================================================================
# CORS CONFIGURATION
# ===================================================================
app.cors.allowed-origins=http://localhost:5173

# ===================================================================
# JACKSON (JSON serialization)
# ===================================================================
spring.jackson.serialization.indent-output=true
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Kolkata

# ===================================================================
# LOGGING
# ===================================================================
logging.level.root=INFO
logging.level.org.springframework.security=DEBUG
logging.level.com.careerforge=DEBUG

# ===================================================================
# ERROR HANDLING
# ===================================================================
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never
server.error.include-exception=false

# ===================================================================
# AI SERVICE (placeholder — we'll fill this later)
# ===================================================================
gemini.api.key=${GEMINI_API_KEY}

gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent